<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgroConectado</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- HEADER -->
  <header>
    <h1>🌱 AgroConectado</h1>
    <p>O Desafio do Futuro</p>
  </header>

  <!-- MAIN -->
  <main>

    <!-- TABULEIRO -->
    <section class="tabuleiro">
      <div class="hex lavoura" onclick="window.location.href='lavoura.html'">
        🌾
        <span>Lavoura</span>
      </div>

      <div class="hex pecuaria" onclick="window.location.href='pecuaria.html'">
        🐄
        <span>Pecuária</span>
      </div>

      <div class="hex floresta" onclick="window.location.href='floresta.html'">
        🌳
        <span>Floresta</span>
      </div>

      <div class="hex agua" onclick="window.location.href='nascente.html'">
        💧
        <span>Nascente</span>
      </div>

      <div class="hex energia" onclick="window.location.href='energia.html'">
        ☀️
        <span>Energia</span>
      </div>
    </section>

    <!-- PAINEL -->
    <section class="painel">
      <h2>📊 Fazenda</h2>
      <div class="status">
        <div class="card-status">
          🌾 Produção
          <h3 id="producao">60</h3>
        </div>
        <div class="card-status">
          ♻️ Sustentabilidade
          <h3 id="sustentabilidade">100</h3>
        </div>
        <div class="card-status">
          💰 Recursos
          <h3 id="recursos">350</h3>
        </div>
      </div>

      <h2>🛠️ Tecnologias Verdes</h2>
      <div class="botoes">
        <button onclick="usarTecnologia('plantio')">🌱 Plantio Direto</button>
        <button onclick="usarTecnologia('solar')">☀️ Energia Solar</button>
        <button onclick="usarTecnologia('drone')">🚁 Drone Agrícola</button>
        <button onclick="pesquisarClima()">🔎 Pesquisar Clima</button>
        <button onclick="eventoClimatico()">🌦️ Próxima Safra</button>
      </div>
    </section>

    <!-- EVENTOS -->
    <section class="eventos">
      <h2>📢 Eventos Climáticos</h2>
      <div id="mensagem">Bem-vindo ao AgroConectado 🌱</div>
    </section>

  </main>

  <!-- JAVASCRIPT -->
  <script src="java.js"></script>

</body>

</html>
